name: Deploy to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch: {}   # lets us manually re-trigger once secrets are in place

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_9VnhNesZso2IlPQlqAIp34Js
      VERCEL_PROJECT_ID: prj_0jRfAgadPu3v3GyUGAAn8KTsDI2N
    steps:
      - uses: actions/checkout@v4

      # Vercel's own build machines don't have pandoc (see tools/build_site.py),
      # so the site is built here on a normal Ubuntu runner instead.
      - name: Install pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python dependencies
        run: uv sync --frozen

      - name: Build site
        run: uv run python tools/build_site.py

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: web
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build for Vercel
        working-directory: web
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        working-directory: web
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
