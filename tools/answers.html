<!-- Hover/tap-to-reveal answers + a lock toggle. Injected after <body> by render.py.
     Self-activating: does nothing unless the page actually contains .answer elements.
     Authoring (in the worksheet .md):
         ::: answer
         $x = 8$ — subtract 7 from both sides.
         :::
       inline:  [$x = 8$]{.answer}
     Styling lives in worksheet.css (.answer / .answers-toggle). -->
<script>
(function () {
  // .answer = short answer key; .rephrase/.hint/.steps = the scaffold ladder on
  // stretch problems. All share one tap-to-reveal + lock model.
  var SEL = ".answer, .rephrase, .hint, .steps";
  var answers = document.querySelectorAll(SEL);
  if (!answers.length) return;                 // nothing revealable → no toggle

  var KEY = "ws-answers-locked";
  var stored = localStorage.getItem(KEY);
  var locked = stored === null ? true : stored === "1";   // default LOCKED until you opt in

  var btn = document.createElement("button");
  btn.type = "button";
  btn.className = "answers-toggle";

  function render() {
    document.body.classList.toggle("answers-locked", locked);
    if (locked) {                              // locking re-hides anything open
      document.querySelectorAll(".revealed")
        .forEach(function (a) { a.classList.remove("revealed"); });
    }
    btn.setAttribute("aria-pressed", String(locked));
    // Label always describes what TAPPING THE BUTTON does, not what tapping an
    // answer does — those are different targets and conflating them read as
    // "broken" on touch devices where there's no hover to disambiguate.
    btn.textContent = locked ? "🔒 Locked — tap to unlock" : "🔓 Unlocked — tap to lock";
    btn.title = locked
      ? "Answers are locked — tap here to unlock, then tap any answer to reveal it"
      : "Tap any answer to reveal it — tap here to lock again";
  }

  btn.addEventListener("click", function () {
    locked = !locked;
    localStorage.setItem(KEY, locked ? "1" : "0");
    render();
  });
  document.body.appendChild(btn);
  render();

  function pulseToggle() {                     // surfaces the unlock control instead of a silent no-op
    btn.classList.remove("pulse");
    void btn.offsetWidth;                      // restart the CSS animation
    btn.classList.add("pulse");
  }

  // tap / click a blurred block to toggle it (works on touch e-readers, not just hover)
  document.addEventListener("click", function (e) {
    if (e.target.closest(".answers-toggle")) return;
    var a = e.target.closest(SEL);
    if (!a) return;
    if (locked) { pulseToggle(); return; }      // tapped while locked — point at the unlock button
    a.classList.toggle("revealed");
  });
})();
</script>
